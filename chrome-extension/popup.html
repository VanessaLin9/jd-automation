<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="popup.pageTitle">JD Saver</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="panel">
      <header class="panel-header">
        <div>
          <p class="eyebrow" data-i18n="app.name">JD Saver</p>
          <h1 data-i18n="popup.title">Save Current JD</h1>
        </div>
        <button id="open-options" class="ghost-button" type="button" data-i18n="popup.settingsButton">Settings</button>
      </header>

      <section class="status-card">
        <p id="status-text" class="status-text" data-i18n="popup.preparing">Preparing extractor...</p>
      </section>

      <section class="details-card">
        <dl class="details-list">
          <div>
            <dt data-i18n="popup.source">Source</dt>
            <dd id="source-site">-</dd>
          </div>
          <div>
            <dt data-i18n="popup.titleLabel">Title</dt>
            <dd id="job-title">-</dd>
          </div>
          <div>
            <dt data-i18n="popup.company">Company</dt>
            <dd id="company">-</dd>
          </div>
          <div>
            <dt data-i18n="popup.url">URL</dt>
            <dd id="job-url">-</dd>
          </div>
        </dl>
      </section>

      <footer class="panel-footer">
        <button id="save-jd" class="primary-button" type="button" disabled data-i18n="popup.saveButton">Save JD</button>
      </footer>
    </main>

    <script src="utils.js"></script>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
